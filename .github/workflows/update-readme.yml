name: Update README with Years of Experience

on:
  schedule:
    # Executa todo dia 2 de Julho às 00:00 UTC
    - cron: '0 0 2 7 *'
  workflow_dispatch: # Permite executar manualmente

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update years of experience
        run: |
          # Data de início: Julho de 2020
          START_DATE="2020-07-01"
          CURRENT_DATE=$(date +%Y-%m-%d)
          
          # Calcula anos de experiência
          START_YEAR=$(date -d "$START_DATE" +%Y)
          START_MONTH=$(date -d "$START_DATE" +%-m)
          CURRENT_YEAR=$(date -d "$CURRENT_DATE" +%Y)
          CURRENT_MONTH=$(date -d "$CURRENT_DATE" +%-m)
          
          YEARS=$((CURRENT_YEAR - START_YEAR))
          if [ $CURRENT_MONTH -lt $START_MONTH ]; then
            YEARS=$((YEARS - 1))
          fi
          
          # Atualiza o README.md
          sed -i "s/over [0-9]\+ years of experience/over $YEARS years of experience/g" README.md
          
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "chore: update years of experience [skip ci]"
          git push
